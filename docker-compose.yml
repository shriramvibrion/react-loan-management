version: '3.8'

services:
  frontend:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Shriram@123
      - DB_NAME=reactloanmanagement
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306" # Exposing on 3307 to avoid local 3306 conflicts if any
    environment:
      MYSQL_ROOT_PASSWORD: Shriram@123
      MYSQL_DATABASE: reactloanmanagement
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pShriram@123"]
      interval: 10s
      timeout: 5s
      retries: 5
