services:
  - type: web
    name: ezl-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements_deploy.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FLASK_DEBUG
        value: "false"
